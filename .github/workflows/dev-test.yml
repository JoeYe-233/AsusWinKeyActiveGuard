name: Dev Branch CI & Artifact Test

on:
  push:
    branches:
      - dev               # 推送到 dev 时自动触发（走默认的 Release）
  workflow_dispatch:
    inputs:
      build_config:
        description: '选择编译配置 (仅影响本次手动运行)'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-and-test:
    runs-on: windows-latest
    # 设置一个全局环境变量，巧妙处理 push 和手动触发的差异
    env:
      # 如果 inputs.build_config 存在（手动触发），就用它；否则（push 触发），默认用 Release
      BUILD_CONFIG: ${{ inputs.build_config || 'Release' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build Solution
      # 使用环境变量动态传入 Configuration
      run: msbuild AsusWinKeyActiveGuard.sln /p:Configuration=${{ env.BUILD_CONFIG }} /p:Platform=x64

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        # 下载时的压缩包名字也会跟着变，比如：AsusWinKeyActiveGuard-Dev-Debug-EXE
        name: AsusWinKeyActiveGuard-Dev-${{ env.BUILD_CONFIG }}-EXE
        # 路径动态匹配 Debug 或 Release 文件夹
        path: 'x64/${{ env.BUILD_CONFIG }}/AsusWinKeyActiveGuard.exe'
        retention-days: 7